services:
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: multgame
      POSTGRES_USER: multgame
      POSTGRES_PASSWORD: multgame
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multgame -d multgame"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api-server:
    build:
      context: ./api
    environment:
      PORT: "8081"
      REDIS_ADDR: redis:6379
      JWT_SECRET: dev-secret
      REPORT_SHARED_SECRET: dev-report-secret
      PUBLIC_GAME_WS_URL: ws://localhost:8080/ws
      LOBBY_ID: local-lobby
      SPECTATOR_MODE_ENABLED: "true"
      SPECTATOR_ADMIN_SECRET: dev-spectator-secret
      MATCH_ANALYTICS_ENABLED: "false"
      DATABASE_URL: postgres://multgame:multgame@postgres:5432/multgame?sslmode=disable
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"

  api-migrate:
    build:
      context: ./api
    command: ["/usr/local/bin/migrate"]
    entrypoint: []
    profiles:
      - tools
    environment:
      DATABASE_URL: postgres://multgame:multgame@postgres:5432/multgame?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  game-server:
    build:
      context: ./server
    env_file:
      - path: ./config/game-server.env
        required: true
      - path: ./config/game-server.local.env
        required: false
    environment:
      PORT: "8080"
      JWT_SECRET: dev-secret
      REPORT_SHARED_SECRET: dev-report-secret
      API_SERVER_URL: http://api-server:8081
      LOBBY_ID: local-lobby
      MATCH_ANALYTICS_ENABLED: "false"
    depends_on:
      - api-server
    ports:
      - "8080:8080"

  web-client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: http://localhost:8081
        VITE_INTERPOLATION_DELAY_MS: "100"
        VITE_SPECTATOR_MODE_ENABLED: "true"
    depends_on:
      - api-server
      - game-server
    ports:
      - "5173:80"

volumes:
  postgres-data:
