services:
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  api-server:
    build:
      context: ./api
    environment:
      PORT: "8081"
      REDIS_ADDR: redis:6379
      JWT_SECRET: dev-secret
      REPORT_SHARED_SECRET: dev-report-secret
      PUBLIC_GAME_WS_URL: ws://localhost:8080/ws
      LOBBY_ID: local-lobby
    depends_on:
      - redis
    ports:
      - "8081:8081"

  game-server:
    build:
      context: ./server
    env_file:
      - ./config/game-server.env
      - ./config/game-server.local.env
    environment:
      PORT: "8080"
      JWT_SECRET: dev-secret
      REPORT_SHARED_SECRET: dev-report-secret
      API_SERVER_URL: http://api-server:8081
      LOBBY_ID: local-lobby
    depends_on:
      - api-server
    ports:
      - "8080:8080"

  web-client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: http://localhost:8081
    depends_on:
      - api-server
      - game-server
    ports:
      - "5173:80"
