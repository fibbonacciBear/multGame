name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [server, api, ws-router]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4
          working-directory: ${{ matrix.module }}
      - name: Test
        run: go test ./...

  client-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  manifest-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0
      - name: Render dev overlay
        run: kubectl kustomize k8s/overlays/dev
      - name: Render prod overlay
        run: kubectl kustomize k8s/overlays/prod
      - name: Render dev monitoring overlay
        run: kubectl kustomize k8s/overlays/dev-monitoring

  images:
    runs-on: ubuntu-latest
    needs:
      - go-quality
      - client-quality
      - manifest-validation
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: multgame-game-server
            context: ./server
          - image: multgame-api-server
            context: ./api
          - image: multgame-ws-router
            context: ./ws-router
          - image: multgame-web-client
            context: ./client
    steps:
      - uses: actions/checkout@v4

      - name: Compute image coordinates
        id: image
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "repository=ghcr.io/${owner}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image locally
        run: docker build -t "${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}" ${{ matrix.context }}

      - name: Generate Trivy SARIF
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Enforce CRITICAL vulnerability policy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          skip-setup-trivy: true

      - name: Push image
        run: docker push "${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}"
