apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: game-server
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: game-server
    spec:
      terminationGracePeriodSeconds: 330
      containers:
        - name: game-server
          image: multgame/game-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: game-server-config
            - secretRef:
                name: app-secrets
            - secretRef:
                name: redis-secrets
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 1
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
