apiVersion: v1
kind: ConfigMap
metadata:
  name: game-server-config
data:
  # Core runtime/network settings
  PORT: "8080"
  API_SERVER_URL: "http://api-server:8081"
  REDIS_ADDR: "redis:6379"

  # Loop/capacity tuning
  TICK_RATE: "60"
  SNAPSHOT_RATE: "60"
  MAX_PLAYERS: "10"


  # World + movement physics tuning
  WORLD_WIDTH: "4000"
  WORLD_HEIGHT: "4000"
  GRAVITY_ACCEL: "2000"
  DRAG: "0.97"
  TERMINAL_SPEED: "800"
  NUM_OBJECTS: "200"
  STARTING_MASS: "10"
  HEALTH_BASE: "100"
  HEALTH_SCALE: "25"
  HEALTH_MASS_SCALE: "10"
  RADIUS_BASE: "10"
  RADIUS_SCALE: "6"
  RADIUS_MASS_SCALE: "10"

  # Projectile combat tuning
  PROJECTILE_SPEED: "1250"
  PROJECTILE_DAMAGE: "28"
  PROJECTILE_RADIUS: "5"
  SHOOT_COOLDOWN: "250ms"
  PROJECTILE_TTL: "1200ms"

  # Classic combat/ruleset tuning
  CRASH_DAMAGE_PCT: "0.9"
  CRASH_PAIR_COOLDOWN: "500ms"
  CRASH_KNOCKBACK_IMPULSE: "250"
  KILL_MASS_TRANSFER_PCT: "0.45"
  KILL_HEAL_PCT: "0.2"
  RESPAWN_RETENTION_PCT: "0.45"
  SPAWN_INVULNERABILITY_DURATION: "1s"
  SPAWN_CLEARANCE_ATTEMPTS: "20"
  PASSIVE_HEAL_PER_SECOND: "2.5"
  PASSIVE_HEAL_COMBAT_DELAY: "1500ms"
  BOT_DIFFICULTY_MODE: "weighted"
  BOT_DIFFICULTY_DISTRIBUTION: "L0:10,L1:30,L2:40,L3:20"

  # Match/lifecycle tuning
  MATCH_DURATION: "5m"
  RESPAWN_DELAY: "2s"
  BOT_FILL_DELAY: "5s"
  REGISTRY_HEARTBEAT_INTERVAL: "5s"
  REGISTRY_HEARTBEAT_TTL: "10s"
  LOBBY_TTL: "330s"
  HEALTH_TICK_THRESHOLD: "2s"
  SHUTDOWN_DRAIN_TIMEOUT: "320s"
