apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ws-router
  template:
    metadata:
      labels:
        app: ws-router
    spec:
      containers:
        - name: ws-router
          image: multgame/ws-router:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: PORT
              value: "8082"
            - name: BACKEND_PORT
              value: "8080"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
