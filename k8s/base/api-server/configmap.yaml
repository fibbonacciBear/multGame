apiVersion: v1
kind: ConfigMap
metadata:
  name: api-server-config
data:
  PORT: "8081"
  REDIS_ADDR: "redis:6379"
  TOKEN_TTL: "10m"
  REGISTRY_CLEANUP_INTERVAL: "15s"
  PUBLIC_GAME_WS_URL: "ws://localhost:8080/ws"
  WS_ROUTER_BASE_URL: "ws://multgame.localtest.me/ws"
  SPECTATOR_MODE_ENABLED: "false"
  MATCH_ANALYTICS_ENABLED: "false"
  DATABASE_MAX_OPEN_CONNS: "5"
  DATABASE_MAX_IDLE_CONNS: "2"
  DATABASE_CONN_MAX_LIFETIME: "30m"
  DATABASE_QUERY_TIMEOUT: "3s"
  MATCH_METRICS_MAX_BYTES: "1048576"
  MATCH_METRICS_MAX_PLAYERS: "128"
  MATCH_METRICS_MAX_EVENTS: "4096"
