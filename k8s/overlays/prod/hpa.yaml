apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: game-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: game-server
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Pods
      pods:
        metric:
          name: active_players_per_pod
        target:
          type: AverageValue
          averageValue: "8"
