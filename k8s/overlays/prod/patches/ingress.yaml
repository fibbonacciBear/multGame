apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multgame
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - astrodrift.io
      secretName: multgame-tls
  rules:
    - host: astrodrift.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-server
                port:
                  number: 8081
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: ws-router
                port:
                  number: 8082
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-client
                port:
                  number: 80
